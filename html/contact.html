        <section class="contact section" id="contact">
            <span class="section__subtitle">Get in Touch</span>
            <h2 class="section__title">Contact Me</h2>

            <div class="contact__container container grid">
                <div class="contact__content">
                    <h3 class="contact__title">Talk to Me</h3>

                    <div class="contact__info">
                        <div class="contact__card">
                            <i class='bx bx-envelope' ></i>
                            <h3 class="contact__card-title">Gmail</h3>
                            <span class="contact__card-data">reiannaenano@gmail.com</span>

                            <a href="mailto:reiannaenano@gmail.com" target="_blank" class="contact__button">
                            Write Me <i class='bx bx-right-arrow-alt contact__button-icon' ></i>
                        </a>
                        </div>

                        <div class="contact__card">
                            <i class='bx bxl-whatsapp' ></i>
                            <h3 class="contact__card-title">Whatsapp</h3>
                            <span class="contact__card-data">916-3352-663</span>

                            <a href="https://api.whatsapp.com/send?phone=09613352663&text=Hello,%20more%20information!" target="_blank" class="contact__button">
                            Write Me <i class='bx bx-right-arrow-alt contact__button-icon' ></i>
                        </a>
                        </div>

                    </div>
                </div>

                <div class="contact__content">
                    <h3 class="contact__title">Message Me</h3>

                    <form action="" class="contact__form">
                        <div class="contact__form-div">
                            <label for="" class="contact__form-tag">Name</label>
                            <input type="text" placeholder="Insert your Name" class="contact__form-input">
                        </div>

                        <div class="contact__form-div">
                            <label for="" class="contact__form-tag">Mail</label>
                            <input type="text" placeholder="Insert your Email" class="contact__form-input">
                        </div>

                        <div class="contact__form-div contact__form-area">
                            <label for="" class="contact__form-tag">Message</label>
                            <textarea name="" id="" cols="30" rows="10" placeholder="Write your Message" class="contact__form-input"></textarea>
                        </div>

                        <button class="button"><b>Send Message</b></button>
                    </form>
                </div>
            </div>

        </section>
